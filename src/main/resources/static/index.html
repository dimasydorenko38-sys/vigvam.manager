<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vigvam Manager PRO - Final Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell-width { min-width: 200px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 30; border-right: 3px solid #1e293b; }

        .lesson-card { cursor: pointer; transition: all 0.2s; border-left-width: 6px; position: relative; }
        .lesson-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 10; }

        /* Світло-сірі плани */
        .plan-card { opacity: 0.6; border-style: dashed !important; border-left-width: 4px; background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #64748b !important; }
        .plan-card:hover { opacity: 1; background-color: #e2e8f0 !important; }

        /* Кнопка додавання в кутку */
        .empty-slot { cursor: pointer; min-height: 100px; position: relative; }
        .add-btn-quick { position: absolute; top: 4px; right: 4px; opacity: 0; transition: opacity 0.2s; background: #6366f1; color: white; border-radius: 6px; padding: 2px 6px; font-size: 10px; z-index: 5; }
        .empty-slot:hover .add-btn-quick { opacity: 1; }
        .empty-slot:hover { background-color: #f8fafc !important; }

        /* Сирена */
        .siren-icon { position: absolute; bottom: 6px; right: 6px; font-size: 1.4rem; animation: ring-siren 0.6s infinite; z-index: 20; }
        @keyframes ring-siren {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px red); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 6px red); }
            100% { transform: scale(1); filter: drop-shadow(0 0 2px red); }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-4 font-sans text-[11px] text-slate-800">

<div class="max-w-full mx-auto bg-slate-900 p-4 rounded-t-2xl flex flex-wrap gap-4 items-center px-6 shadow-2xl">
    <div class="flex items-center gap-3">
        <div class="bg-indigo-500 p-2 rounded-lg text-white font-bold">V</div>
        <input type="number" id="orgIdInput" value="2" class="w-12 bg-transparent text-white text-sm outline-none font-black">
    </div>
    <input type="password" id="jwtInput" placeholder="JWT Token..." class="flex-1 bg-slate-800 text-indigo-300 text-[10px] px-3 py-1.5 rounded-lg border border-slate-700 outline-none">
    <button onclick="saveAndFetch()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Оновити</button>
</div>

<div class="max-w-full mx-auto bg-white p-5 rounded-b-2xl shadow-xl mb-6 border-b border-slate-200 flex justify-between items-center">
    <div>
        <h1 id="orgName" class="text-xl font-black text-slate-900 uppercase">Vigvam</h1>
        <div id="orgInfo" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Loading...</div>
    </div>
    <div class="flex gap-2 p-1 bg-slate-100 rounded-xl">
        <input type="date" id="startDate" value="2026-03-05" class="bg-transparent px-3 py-1 outline-none font-bold text-slate-700">
        <input type="date" id="endDate" value="2026-03-14" class="bg-transparent px-3 py-1 outline-none font-bold text-slate-700">
    </div>
</div>

<div id="mainContent" class="space-y-8">
    <section>
        <div class="flex justify-between items-end mb-2 px-2">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">👤 Індивідуальні заняття</h2>
        </div>
        <div class="overflow-x-auto rounded-2xl border border-slate-200 shadow-lg bg-white">
            <table class="w-full border-collapse">
                <thead id="headINDIVIDUAL"></thead>
                <tbody id="bodyINDIVIDUAL"></tbody>
            </table>
        </div>
    </section>

    <section>
        <div class="flex justify-between items-end mb-2 px-2">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">👥 Групові заняття</h2>
        </div>
        <div class="overflow-x-auto rounded-2xl border border-indigo-100 shadow-lg bg-white">
            <table class="w-full border-collapse">
                <thead id="headGROUP"></thead>
                <tbody id="bodyGROUP"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="formModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-4" onclick="closeModal('formModal')">
    <div class="bg-white rounded-[2rem] w-full max-w-md overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
        <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
            <h3 id="formTitle" class="text-xs font-black uppercase">Параметри заняття</h3>
            <button onclick="closeModal('formModal')">✕</button>
        </div>
        <form id="lessonForm" class="p-8 space-y-4">
            <input type="hidden" id="fieldLessonId">
            <input type="hidden" id="fieldParentPlanId">

            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[9px] font-bold text-slate-400 uppercase">Тип</label>
                    <select id="fieldType" class="w-full border-2 border-slate-100 p-2.5 rounded-xl text-xs font-bold">
                        <option value="INDIVIDUAL">INDIVIDUAL</option>
                        <option value="GROUP">GROUP</option>
                    </select>
                </div>
                <div><label class="text-[9px] font-bold text-slate-400 uppercase">Статус</label>
                    <select id="fieldStatus" class="w-full border-2 border-slate-100 p-2.5 rounded-xl text-xs font-bold">
                        <option value="">NULL</option>
                        <option value="WAIT">WAIT</option>
                        <option value="DONE">DONE</option>
                        <option value="CANCELED">CANCELED</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[9px] font-bold text-slate-400 uppercase">ID Дитини</label>
                    <input type="number" id="fieldChildId" class="w-full border-2 border-slate-100 p-2.5 rounded-xl text-xs font-bold">
                </div>
                <div><label class="text-[9px] font-bold text-slate-400 uppercase">ID Послуги</label>
                    <input type="number" id="fieldServiceId" class="w-full border-2 border-slate-100 p-2.5 rounded-xl text-xs font-bold" required>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[9px] font-bold text-slate-400 uppercase">ID Викладача</label>
                    <input type="number" id="fieldEmployeeId" class="w-full border-2 border-slate-100 p-2.5 rounded-xl text-xs font-bold" required>
                </div>
                <div><label class="text-[9px] font-bold text-slate-400 uppercase">Дата/Час</label>
                    <input type="datetime-local" id="fieldStart" class="w-full border-2 border-slate-100 p-2.5 rounded-xl text-xs font-bold" required>
                </div>
            </div>
            <div><label class="text-[9px] font-bold text-slate-400 uppercase">Коментар</label>
                <textarea id="fieldComments" class="w-full border-2 border-slate-100 p-3 rounded-xl text-xs h-20 outline-none font-medium"></textarea>
            </div>
            <div class="flex gap-4 pt-2">
                <button type="button" onclick="closeModal('formModal')" class="flex-1 py-3 bg-slate-100 font-black rounded-xl uppercase text-[10px]">Скасувати</button>
                <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white font-black rounded-xl uppercase text-[10px]">Зберегти</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_BASE = `http://${window.location.hostname}:8080/api`;
    const STATUS_UI = {
        'WAIT': { icon: '⏳', color: 'border-sky-300 bg-sky-50 text-sky-800' },
        'DONE': { icon: '✅', color: 'border-emerald-400 bg-emerald-50 text-emerald-800' },
        'CANCELED': { icon: '❌', color: 'border-rose-500 bg-rose-50 text-rose-900' },
        'DEFAULT': { icon: '🔘', color: 'border-slate-200 bg-slate-50 text-slate-500' }
    };

    const getAuthHeader = () => ({ 'Authorization': `Bearer ${localStorage.getItem('vigvam_token') || ''}` });

    function saveAndFetch() {
        localStorage.setItem('vigvam_token', document.getElementById('jwtInput').value);
        localStorage.setItem('vigvam_org_id', document.getElementById('orgIdInput').value);
        fetchSchedule();
    }

    async function fetchSchedule() {
        const payload = {
            startDate: document.getElementById('startDate').value,
            endDate: document.getElementById('endDate').value,
            organizationId: parseInt(document.getElementById('orgIdInput').value)
        };
        try {
            const response = await fetch(`${API_BASE}/schedule/period`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...getAuthHeader() },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            document.getElementById('orgName').innerText = data.organization.organizationName;
            document.getElementById('orgInfo').innerText = `📍 ${data.organization.organizationCity} • ID: ${data.organization.id}`;
            renderTable(data, 'INDIVIDUAL', 'headINDIVIDUAL', 'bodyINDIVIDUAL');
            renderTable(data, 'GROUP', 'headGROUP', 'bodyGROUP');
        } catch (e) { console.error(e); }
    }

    function createCard(item, tStr, isPlan, hasConflict) {
        const ui = STATUS_UI[item.lessonStatus] || STATUS_UI['DEFAULT'];
        const cardClass = isPlan ? 'plan-card' : '';
        const conflictMarker = hasConflict ? '<div class="siren-icon">🚨</div>' : '';

        let content = item.childId
            ? `<div class="font-black text-[10px] text-slate-900 uppercase">👶 Дитина: ${item.childId}</div>
               <div class="text-[8px] text-slate-500 leading-tight truncate italic">${item.comments || ''}</div>`
            : `<div class="font-bold text-[10px] text-slate-700 leading-tight">${item.comments || '---'}</div>`;

        return `
            <div onclick="event.stopPropagation(); openLesson('${encodeURIComponent(JSON.stringify(item))}', ${isPlan})"
                 class="lesson-card ${cardClass} ${ui.color} p-3 mb-2 rounded-xl shadow-sm">
                ${conflictMarker}
                ${content}
                <div class="flex justify-between items-end mt-3 pt-2 border-t border-black/5">
                    <div class="flex flex-col">
                        <span class="text-[7px] font-bold opacity-50 uppercase">Srv: ${item.serviceTypeId || 'N/A'}</span>
                        <span class="text-[8px] font-black">${ui.icon} ${item.lessonStatus || 'NULL'}</span>
                    </div>
                    <span class="text-[9px] font-mono font-bold bg-white/40 px-1 rounded">${tStr}</span>
                </div>
            </div>`;
    }

    function renderTable(data, type, headId, bodyId) {
        const schedule = data.schedule;
        const employees = data.employeesData;
        const dates = Object.keys(schedule).sort();
        const settings = data.organization.settingLessons[type];
        if (!settings) return;

        const head = document.getElementById(headId);
        const body = document.getElementById(bodyId);
        head.innerHTML = ""; body.innerHTML = "";
        const step = settings.lessonDurationMinutes + settings.breakDurationMinutes;

        let hRow1 = `<tr><th rowspan="2" class="p-4 sticky-col bg-slate-900 text-white w-20 border-r border-slate-700 text-[10px]">⏱ ЧАС</th>`;
        let hRow2 = `<tr>`;

        dates.forEach(date => {
            const dayEmpIds = schedule[date].employeeIds || [];
            // Рендеримо стільки стовпчиків, скільки ID в масиві дня. Якщо масив порожній —colspan=1 для пустого місця.
            hRow1 += `<th colspan="${dayEmpIds.length || 1}" class="p-3 text-center bg-slate-800 border-l border-slate-700 text-white uppercase text-[9px] font-black tracking-widest">${date.split('-').reverse().join('.')}</th>`;

            if (dayEmpIds.length > 0) {
                dayEmpIds.forEach(id => {
                    const emp = employees.find(e => e.id === id);
                    hRow2 += `<th class="p-2 cell-width text-center bg-slate-50 text-slate-400 border-l border-b border-slate-200 font-black uppercase text-[8px] tracking-tighter">${emp ? emp.name : 'ID: ' + id}</th>`;
                });
            } else {
                hRow2 += `<th class="cell-width bg-slate-50 border-l border-b border-slate-200"></th>`;
            }
        });
        head.innerHTML = hRow1 + "</tr>" + hRow2 + "</tr>";

        let time = new Date(`1970-01-01T${settings.firstHourOfWork}`);
        const end = new Date(`1970-01-01T${settings.lastHourOfWork}`);

        while (time <= end) {
            const tStr = time.toTimeString().substring(0, 5);
            let row = `<tr><td class="p-4 font-mono font-black text-center sticky-col bg-white border-r-2 text-slate-400">${tStr}</td>`;

            dates.forEach(date => {
                const dayData = schedule[date];
                const dayEmpIds = dayData.employeeIds || [];

                if (dayEmpIds.length > 0) {
                    dayEmpIds.forEach(id => {
                        let cell = "";
                        const hasConflict = dayData.conflictList && dayData.conflictList.some(c => c.lessonType === type && c.employeeId === id && c.startTime.substring(0, 5) === tStr);

                        if (!hasConflict && dayData.planningLessons) {
                            dayData.planningLessons.filter(p => p.lessonType === type && p.employeeId === id && p.lessonTime.substring(0, 5) === tStr)
                                .forEach(p => cell += createCard(p, tStr, true, false));
                        }
                        dayData.lessons.filter(l => (l.lessonType || l.type) === type && l.employeeId === id && l.lessonDateTime.split('T')[1].substring(0, 5) === tStr)
                            .forEach(l => cell += createCard(l, tStr, false, hasConflict));

                        const qf = JSON.stringify({ date, time: tStr, employeeId: id, type });
                        row += `<td class="p-2 border-l border-slate-100 align-top empty-slot" onclick='openFormModal(false, null, ${qf})'>
                                    <div class="add-btn-quick">➕ Додати</div>
                                    ${cell}
                                </td>`;
                    });
                } else {
                    // Пуста клітинка для дня без викладачів
                    row += `<td class="border-l border-slate-100 bg-slate-50/30"></td>`;
                }
            });
            body.innerHTML += row + "</tr>";
            time = new Date(time.getTime() + step * 60000);
        }
    }

    function openLesson(lessonJson, isPlan = false) {
        const lessonData = JSON.parse(decodeURIComponent(lessonJson));
        openFormModal(!isPlan, lessonData);
    }

    function openFormModal(isEdit = false, lessonData = null, quickFill = null) {
        const form = document.getElementById('lessonForm');
        form.reset();
        document.getElementById('fieldLessonId').value = "";
        document.getElementById('fieldParentPlanId').value = "";

        if (isEdit && lessonData) {
            document.getElementById('fieldLessonId').value = lessonData.id;
            document.getElementById('fieldStatus').value = lessonData.lessonStatus || "";
            document.getElementById('fieldType').value = lessonData.lessonType || lessonData.type;
            document.getElementById('fieldChildId').value = lessonData.childId || "";
            document.getElementById('fieldServiceId').value = lessonData.serviceTypeId || "";
            document.getElementById('fieldEmployeeId').value = lessonData.employeeId;
            document.getElementById('fieldStart').value = lessonData.lessonDateTime.substring(0,16);
            document.getElementById('fieldComments').value = lessonData.comments || "";
            document.getElementById('formTitle').innerText = `Редагування #${lessonData.id}`;
        } else if (lessonData && !isEdit) {
            document.getElementById('fieldParentPlanId').value = lessonData.id;
            document.getElementById('fieldEmployeeId').value = lessonData.employeeId;
            document.getElementById('fieldChildId').value = lessonData.childId || "";
            document.getElementById('fieldServiceId').value = lessonData.serviceTypeId || "";
            document.getElementById('fieldType').value = lessonData.lessonType || "";
            const dt = document.getElementById('startDate').value;
            document.getElementById('fieldStart').value = `${dt}T${lessonData.lessonTime.substring(0,5)}`;
            document.getElementById('formTitle').innerText = "Новий запис (з плану)";
        } else if (quickFill) {
            document.getElementById('fieldEmployeeId').value = quickFill.employeeId;
            document.getElementById('fieldStart').value = `${quickFill.date}T${quickFill.time}`;
            document.getElementById('fieldType').value = quickFill.type;
            document.getElementById('formTitle').innerText = "Швидкий запис";
        }
        document.getElementById('formModal').classList.remove('hidden');
    }

    document.getElementById('lessonForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('fieldLessonId').value;
        const parentId = document.getElementById('fieldParentPlanId').value;

        const payload = {
            lessonId: id ? parseInt(id) : null,
            parentPlanId: parentId ? parseInt(parentId) : null,
            lessonStatus: document.getElementById('fieldStatus').value || null,
            childId: document.getElementById('fieldChildId').value ? parseInt(document.getElementById('fieldChildId').value) : null,
            serviceTypeId: parseInt(document.getElementById('fieldServiceId').value),
            lessonType: document.getElementById('fieldType').value,
            lessonDateTime: document.getElementById('fieldStart').value + ":00",
            organizationId: parseInt(document.getElementById('orgIdInput').value),
            employeeId: parseInt(document.getElementById('fieldEmployeeId').value),
            comments: document.getElementById('fieldComments').value.trim() || null
        };
        const endpoint = id ? '/lesson/update' : '/lesson/create';
        try {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...getAuthHeader() },
                body: JSON.stringify(payload)
            });
            if (res.ok) { closeModal('formModal'); fetchSchedule(); }
        } catch (e) { console.error(e); }
    };

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    document.getElementById('jwtInput').value = localStorage.getItem('vigvam_token') || "";
    document.getElementById('orgIdInput').value = localStorage.getItem('vigvam_org_id') || "2";
    window.onload = fetchSchedule;
</script>
</body>
</html>
